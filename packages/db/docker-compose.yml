services:
  postgres:
    image: postgres:16-alpine
    container_name: tracer-postgres
    environment:
      POSTGRES_USER: tracer
      POSTGRES_PASSWORD: tracer
      POSTGRES_DB: tracer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
