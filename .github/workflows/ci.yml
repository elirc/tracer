name: CI

# This workflow activates once the monorepo exists (Sprint 01 adds pnpm + Turborepo).
# Until then, the `detect` job skips the build jobs so `main` stays green — no red X on
# a docs-only repo. As the sprints introduce E2E / convergence / a11y / perf gates,
# uncomment the matching lines below.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_code: ${{ steps.check.outputs.has_code }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f package.json ]; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_code=false (docs-only repo; skipping build jobs)"
            echo "has_code=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    # Uncomment when a sprint needs a database in CI (Sprint 06 sync server onward):
    # services:
    #   postgres:
    #     image: postgres:16
    #     env:
    #       POSTGRES_PASSWORD: postgres
    #     ports: ['5432:5432']
    #     options: >-
    #       --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    #   redis:
    #     image: redis:7
    #     ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck lint test build
      # Tracer gates — turn on as the sprints introduce them:
      # - run: pnpm turbo run test:e2e          # S05+ Playwright (incl. keyboard-only journey)
      # - run: pnpm turbo run test:convergence  # S06/S07 sync convergence fuzzer
      # - run: pnpm turbo run test:a11y         # S14 axe-core gate
      # - run: pnpm turbo run perf:budget       # S12 latency-budget gate
